apiVersion: v1
kind: Namespace
metadata:
  name: rag-genai
  labels:
    name: rag-genai
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rag-genai-sa
  namespace: rag-genai
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: rag-genai
data:
  APP_ENV: "production"
  APP_HOST: "0.0.0.0"
  APP_PORT: "5000"
  LOG_LEVEL: "INFO"
  LLM_PROVIDER: "3"
  CHROMA_DB_PATH: "/data/chroma_db"
  KB_DATA_FOLDER: "/data/kb"
  RAG_TOP_K: "3"
  RAG_SIMILARITY_THRESHOLD: "0.5"
  CORS_ORIGINS: "http://localhost:3000,http://localhost:5000"
---
apiVersion: v1
kind: Secret
metadata:
  name: rag-secrets
  namespace: rag-genai
type: Opaque
stringData:
  llm_provider: "3"
  gcp_project_id: "your-gcp-project-id"
  huggingface_api_key: "your-huggingface-api-key"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-genai-api
  namespace: rag-genai
  labels:
    app: rag-genai-api
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rag-genai-api
  template:
    metadata:
      labels:
        app: rag-genai-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: rag-genai-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: rag-genai-api
        image: gcr.io/PROJECT_ID/rag-genai-api:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: rag-config
        - secretRef:
            name: rag-secrets
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/var/secrets/google/key.json"
        volumeMounts:
        - name: google-cloud-key
          mountPath: /var/secrets/google
          readOnly: true
        - name: chroma-db
          mountPath: /data/chroma_db
        - name: kb-data
          mountPath: /data/kb
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: google-cloud-key
        secret:
          secretName: google-cloud-key
      - name: chroma-db
        persistentVolumeClaim:
          claimName: rag-genai-chroma-pvc
      - name: kb-data
        configMap:
          name: rag-data-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - rag-genai-api
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: rag-genai-api-service
  namespace: rag-genai
  labels:
    app: rag-genai-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: rag-genai-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-genai-api-hpa
  namespace: rag-genai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-genai-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rag-genai-api-pdb
  namespace: rag-genai
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: rag-genai-api
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rag-genai-chroma-pvc
  namespace: rag-genai
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
