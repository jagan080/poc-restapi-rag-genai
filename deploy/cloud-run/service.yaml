# Cloud Run deployment configuration
# Deploy with: gcloud run deploy rag-genai-api --source . --platform managed --region us-central1

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: rag-genai-api
  namespace: default
  annotations:
    serving.knative.dev/creator: gke-user
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containers:
      - image: gcr.io/PROJECT_ID/rag-genai-api:latest
        ports:
        - containerPort: 5000
        env:
        - name: APP_ENV
          value: "production"
        - name: APP_HOST
          value: "0.0.0.0"
        - name: APP_PORT
          value: "5000"
        - name: LOG_LEVEL
          value: "INFO"
        - name: LLM_PROVIDER
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: llm_provider
        - name: GOOGLE_CLOUD_PROJECT
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: gcp_project_id
        - name: HUGGINGFACE_API_KEY
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: huggingface_api_key
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/var/secrets/google/key.json"
        volumeMounts:
        - name: google-cloud-key
          mountPath: /var/secrets/google
        - name: chroma-db-volume
          mountPath: /app/chroma_db
        - name: data-volume
          mountPath: /app/data
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: google-cloud-key
        secret:
          secretName: google-cloud-key
      - name: chroma-db-volume
        emptyDir: {}
      - name: data-volume
        configMap:
          name: rag-data-config
      serviceAccountName: rag-genai-sa
      timeoutSeconds: 300
  traffic:
  - percent: 100
    latestRevision: true
